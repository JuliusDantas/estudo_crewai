tarefa_criar_resumo_didatico: 
    description: >
        Elabore um resumo didático sobre {topic} para alunos iniciantes em tecnologia. O texto deve ser escrito em linguagem simples e acolhedora, evitar termos excessivamente técnicos (explique quando necessário), usar exemplos práticos e, se possível, analogias relacionadas ao dia a dia. Inclua uma breve definição do tema, explique por que ele é importante e forneça pelo menos dois exemplos de aplicação prática.
    expected_output: >
        Markdown estruturado, com tópicos bem definidos, linguagem acessível e exemplos práticos.
        Sempre responda em Português (Brasil).
        Não use marcações de snippets de código no início/fim do arquivo de saída, por exemplo ```markdown.
    output_file: "resumo_didatico.md"
    agent: "agente_especialista_didatico"